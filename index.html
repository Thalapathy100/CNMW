<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CNMW Premium Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<style>
:root{--primary:#0bf;--bg:rgba(10,10,20,0.8);--glass:rgba(255,255,255,0.05);}
body{background:#000 url('https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=1470') center/cover fixed;color:#fff;font-family:'Poppins',sans-serif;margin:0;padding:0;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden;}
.glass{background:var(--glass);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:25px;}
.player-box{width:90%;max-width:380px;padding:25px;text-align:center;margin-top:20px;box-shadow:0 20px 50px rgba(0,0,0,0.8);}
.search-bar{display:flex;gap:10px;width:90%;max-width:380px;margin-bottom:15px;}
input{flex:1;padding:12px;border-radius:15px;border:none;background:rgba(0,0,0,0.4);color:#fff;outline:none;font-size:14px;margin-bottom:10px;}
button{padding:10px 20px;border-radius:15px;border:none;background:var(--primary);color:#000;font-weight:600;cursor:pointer;transition:0.3s;}
button:hover{transform:scale(1.05);box-shadow:0 0 15px var(--primary);}

.tabs{display:flex;width:100%;background:rgba(0,0,0,0.6);position:sticky;top:0;z-index:50;padding:10px 0;justify-content:center;gap:10px;}
.tab{padding:8px 15px;font-size:12px;font-weight:600;color:#888;cursor:pointer;border-radius:20px;}
.tab.active{background:var(--primary);color:#000;}

.art-container{position:relative;width:100%;height:280px;margin-bottom:15px;}
.art{width:100%;height:100%;border-radius:20px;object-fit:cover;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
.visualizer{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:4px;align-items:flex-end;height:40px;}
.bar{width:4px;background:var(--primary);border-radius:2px;animation:dance 0.5s infinite alternate;opacity:0;}
.visualizer.active .bar{opacity:1;}
@keyframes dance{from{height:10%;}to{height:100%;}}

.list{width:90%;max-width:380px;margin-top:15px;display:none;}
.list.active{display:block;}
.song-item{display:flex;align-items:center;gap:15px;padding:12px;background:rgba(255,255,255,0.03);border-radius:15px;margin-bottom:10px;transition:0.3s;}
.song-item:hover{background:rgba(255,255,255,0.08);}
.song-item img{width:50px;height:50px;border-radius:10px;object-fit:cover;}
.song-info{flex:1;overflow:hidden;}
.song-info div{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px;}
.controls{display:flex;justify-content:center;align-items:center;gap:20px;margin:15px 0;}
.icon-btn{background:none;color:#fff;font-size:24px;padding:0;box-shadow:none;}
#playBtn{font-size:50px;color:var(--primary);}

/* Login Modal */
#authModal{display:flex;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1000;align-items:center;justify-content:center;text-align:center;}
.auth-card{padding:40px;width:80%;max-width:320px;border:1px solid var(--primary);}
.user-badge{font-size:12px;color:var(--primary);margin-top:10px;}
</style></head><body>

<div id="authModal">
    <div class="glass auth-card">
        <h2 style="color:var(--primary);margin-top:0;">CNMW Cloud</h2>
        <p style="font-size:12px;color:#aaa">Login to sync playlists forever</p>
        <input id="uEmail" type="email" placeholder="Email (e.g. nikhil@cnmw.com)">
        <input id="uPass" type="password" placeholder="Password (Min 6 chars)">
        <button onclick="login()" style="width:100%;margin-top:10px;">Login / Register 🚀</button>
        <p id="authMsg" style="font-size:11px;color:#f44;margin-top:10px;"></p>
    </div>
</div>

<div class="tabs">
    <div class="tab active" id="t-home" onclick="tab('home')">🏠 Explore</div>
    <div class="tab" id="t-lib" onclick="tab('lib')">❤️ Library</div>
    <div class="tab" id="t-yt" onclick="tab('yt')">📺 YT</div>
    <div class="tab" id="t-set" onclick="tab('set')">⚙️ Settings</div>
</div>

<div class="glass player-box">
    <div class="art-container">
        <img id="cover" class="art" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=600">
        <div class="visualizer" id="viz">
            <div class="bar" style="animation-delay:0s"></div>
            <div class="bar" style="animation-delay:0.1s"></div>
            <div class="bar" style="animation-delay:0.2s"></div>
            <div class="bar" style="animation-delay:0.3s"></div>
            <div class="bar" style="animation-delay:0.4s"></div>
        </div>
    </div>
    <div id="title" style="font-weight:600;font-size:18px;">CNMW Cloud Engine</div>
    <div id="artist" style="font-size:13px;color:#aaa;margin-bottom:10px;">Ready to vibe!</div>
    
    <div class="row"><input type="range" id="prog" value="0" max="100" style="width:100%;cursor:pointer;"></div>
    
    <div class="controls">
        <button class="icon-btn" onclick="prev()">⏮</button>
        <button class="icon-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="icon-btn" onclick="next()">⏭</button>
    </div>
    <div id="msg" style="font-size:11px;color:var(--primary);margin-top:5px;">System Online 🟢</div>
</div>

<div class="search-bar" style="margin-top:20px;">
    <input id="search" placeholder="Search songs, artists..." onkeypress="if(event.key==='Enter')search()">
    <button onclick="search()">Search</button>
</div>

<div class="list active" id="l-home">
    <h4 style="margin-left:10px;color:var(--primary);">Trending Now 🔥</h4>
    <div id="trending-list"></div>
</div>

<div class="list" id="l-lib">
    <h4 style="margin-left:10px;color:var(--primary);">Your Cloud Vault ❤️</h4>
    <div id="fav-list"></div>
</div>

<div class="list" id="l-yt">
    <h4 style="margin-left:10px;color:var(--primary);">YouTube Hits 🎥</h4>
    <div id="yt-list"></div>
</div>

<div class="list" id="l-set">
    <div class="glass" style="padding:20px;text-align:center;">
        <h3 style="color:var(--primary);margin-top:0;">Account Status</h3>
        <p id="userEmailTxt" style="font-size:14px;color:#aaa;">Not Logged In</p>
        <button onclick="auth.signOut()" style="background:#f44;width:100%;">Logout</button>
    </div>
</div>

<div id="yt-player-container" style="position:fixed;bottom:-100px;left:0;width:10px;height:10px;opacity:0.01;">
    <div id="ytplayer"></div>
</div>

<audio id="audio"></audio>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
// --- FIREBASE INITIALIZATION ---
const firebaseConfig = {
  apiKey: "AIzaSyCL7aE2BNu3l8gfq2Nyr7OlLLuJxdHukBA",
  authDomain: "cnmw-f92cc.firebaseapp.com",
  projectId: "cnmw-f92cc",
  storageBucket: "cnmw-f92cc.firebasestorage.app",
  messagingSenderId: "156891564934",
  appId: "1:156891564934:web:332b5013fe9f53f2a4ba07"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- APP VARIABLES ---
const $=i=>document.getElementById(i),au=$('audio'),U="https://cnmw.onrender.com";
let queue=[], qIdx=0, isYt=false, ytp, curUser=null;
let fav=[]; // Cloud array

// --- AUTHENTICATION LOGIC ---
auth.onAuthStateChanged(user => {
    if(user){
        curUser = user;
        $('authModal').style.display = 'none';
        $('userEmailTxt').innerText = `User: ${user.email}`;
        loadCloudFavs(); // Fetch data from Firebase!
        loadTrending();
    } else {
        curUser = null;
        fav = [];
        $('fav-list').innerHTML = '';
        $('authModal').style.display = 'flex';
    }
});

async function login(){
    const e=$('uEmail').value, p=$('uPass').value;
    if(!e || !p) return $('authMsg').innerText = "Enter email and password!";
    $('authMsg').innerText = "Authenticating... ⏳";
    try {
        await auth.signInWithEmailAndPassword(e, p);
    } catch(err) {
        // Smart Login: If user doesn't exist, create an account automatically!
        if(err.code === 'auth/invalid-credential' || err.code === 'auth/user-not-found'){
            try {
                await auth.createUserWithEmailAndPassword(e, p);
            } catch(e2){ $('authMsg').innerText = e2.message; }
        } else {
            $('authMsg').innerText = err.message;
        }
    }
}

// --- CLOUD DATABASE LOGIC (FIRESTORE) ---
async function loadCloudFavs(){
    try {
        const doc = await db.collection('users').doc(curUser.uid).get();
        if(doc.exists){
            fav = doc.data().favorites || [];
            renderFavs();
        }
    } catch(e){ console.error("Cloud DB Error:", e); }
}

async function toggleFav(sObj, e) {
    if(e) e.stopPropagation(); // Stop song from playing when clicking heart
    if(!curUser) return alert("Please login first!");
    
    // Check if song is already in favorites
    const exists = fav.find(x => x.id === sObj.id);
    if(exists){
        fav = fav.filter(x => x.id !== sObj.id);
        $('msg').innerText = "Removed from Cloud 🗑️";
    } else {
        fav.push(sObj);
        $('msg').innerText = "Saved to Cloud ❤️";
    }
    
    renderFavs();
    // Sync with Firebase Database
    await db.collection('users').doc(curUser.uid).set({ favorites: fav }, { merge: true });
}

function renderFavs(){
    $('fav-list').innerHTML = fav.map((s,i) => `
        <div class="song-item" onclick="playSongObject(${i}, 'f')">
            <img src="${s.image}">
            <div class="song-info"><div>${s.title}</div><div style="font-size:11px;color:#888;">${s.artist}</div></div>
            <button onclick="toggleFav({id:'${s.id}'}, event)" style="background:none;color:#f44;font-size:18px;">🗑️</button>
        </div>
    `).join('');
}

// --- UI & PLAYER LOGIC ---
function tab(t){ ['home','lib','yt','set'].forEach(k=>{$(`t-${k}`).className=k===t?'tab active':'tab';$(`l-${k}`).className=k===t?'list active':'list';}); }

function onYouTubeIframeAPIReady(){
    ytp=new YT.Player('ytplayer',{height:'10',width:'10',playerVars:{'autoplay':1,'controls':0,'playsinline':1},events:{'onStateChange':e=>{if(e.data===0)next();}}});
}

async function search(){
    const v=$('search').value; if(!v)return;
    $('msg').innerText="Hunting songs... 🚀";
    try {
        const r=await fetch(`${U}/api/saavn?q=${v}`),j=await r.json();
        const ytR=await fetch(`${U}/api/yt?q=${v}`),ytJ=await ytR.json();
        
        // Normalize Saavn Data
        const saavnData = (j.data?.results||[]).map(s => ({id: s.id, title: s.name, artist: s.primaryArtists, image: s.image[2]?.link, url: s.downloadUrl[s.downloadUrl.length-1]?.link, type: 's'}));
        renderSongs(saavnData, 'trending-list');
        
        // Normalize YT Data
        const ytData = (ytJ.items||[]).map(y => ({id: y.videoId, title: y.title, artist: 'YouTube Server', image: y.videoThumbnails[0]?.url, type: 'y'}));
        renderSongs(ytData, 'yt-list');
        
        tab('home'); $('msg').innerText="HQ Ready 🟢";
    } catch(e){ $('msg').innerText="Search failed!"; }
}

function renderSongs(data, divId){
    $(divId).innerHTML=data.map((s,i)=>`
        <div class="song-item" onclick="setQueueAndPlay(${i}, '${divId}')">
            <img src="${s.image}">
            <div class="song-info"><div>${s.title}</div><div style="font-size:11px;color:#888;">${s.artist}</div></div>
            ${s.type==='s' ? `<button onclick='toggleFav(${JSON.stringify(s).replace(/'/g, "&apos;")}, event)' style="background:none;color:red;font-size:18px;">♥</button>` : ''}
        </div>
    `).join('');
    // Store array temporarily in the div for queue management
    $(divId).dataset.queue = JSON.stringify(data);
}

function setQueueAndPlay(idx, divId){
    queue = JSON.parse($(divId).dataset.queue);
    playSongObject(idx, 'q');
}

function playSongObject(idx, source){
    qIdx = idx;
    const s = source === 'f' ? fav[idx] : queue[idx];
    if(!s) return;
    
    $('title').innerText = s.title; $('artist').innerText = s.artist; $('cover').src = s.image;
    $('viz').className="visualizer active";
    
    if(s.type === 's'){
        isYt=false; if(ytp)ytp.stopVideo();
        au.src = s.url; au.play();
    } else {
        isYt=true; au.pause();
        ytp.loadVideoById(s.id); ytp.playVideo();
    }
    $('playBtn').innerText="⏸";
}

function togglePlay(){
    if(isYt){ ytp.getPlayerState()===1?ytp.pauseVideo():ytp.playVideo(); }
    else{ au.paused?au.play():au.pause(); }
    $('playBtn').innerText = (au.paused || (isYt && ytp.getPlayerState()!==1)) ? "▶" : "⏸";
}

function next(){ if(qIdx<queue.length-1) playSongObject(qIdx+1, 'q'); }
function prev(){ if(qIdx>0) playSongObject(qIdx-1, 'q'); }

au.onended=()=>next();
au.ontimeupdate=()=>{$('prog').value=(au.currentTime/au.duration)*100;};
$('prog').oninput=()=>{if(!isYt && au.duration) au.currentTime=($('prog').value/100)*au.duration;};
window.addEventListener('error',()=>next(),true); // Unstoppable playback fix

async function loadTrending(){
    try {
        const r=await fetch(`${U}/api/saavn?q=Telugu Mass Hit`),j=await r.json();
        const saavnData = (j.data?.results||[]).map(s => ({id: s.id, title: s.name, artist: s.primaryArtists, image: s.image[2]?.link, url: s.downloadUrl[s.downloadUrl.length-1]?.link, type: 's'}));
        renderSongs(saavnData, 'trending-list');
    } catch(e){}
}
</script></body></html>
