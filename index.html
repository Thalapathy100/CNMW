<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNMW - Stable Pro Edition</title>
    <style>
        body { background:#0f0f13; color:#fff; font-family:'Segoe UI',sans-serif; display:flex; flex-direction:column; align-items:center; margin:0; padding:20px 0; min-height:100vh; }
        .player-container { background:#1a1a24; padding:25px; border-radius:20px; box-shadow:0 10px 30px rgba(0,191,255,0.15); width:90%; max-width:350px; text-align:center; border:1px solid #2d2d3d; margin-bottom:20px;}
        .search-box { display:flex; gap:10px; margin-bottom:15px; } .search-box input { flex:1; padding:10px; border-radius:10px; border:none; background:#2d2d3d; color:#fff; outline:none; } .search-box button { padding:10px 15px; border-radius:10px; border:none; background:#00bfff; color:#fff; font-weight:bold; cursor:pointer; }
        .tabs-container { width:100%; overflow-x:auto; margin-bottom:15px; border-radius:10px; background:#2d2d3d; } .tabs { display:flex; width:max-content; min-width:100%; } .tab { flex:1; padding:10px 15px; text-align:center; cursor:pointer; font-size:0.8em; font-weight:bold; color:#8888a0; transition:0.3s; white-space:nowrap; } .tab.active { background:#00bfff; color:#fff; }
        .album-art { width:100%; height:250px; background:#252535; border-radius:15px; margin-bottom:10px; object-fit:cover; box-shadow:0 5px 15px rgba(0,0,0,0.5); }
        .visualizer { display:flex; gap:5px; justify-content:center; align-items:flex-end; height:30px; margin-bottom:15px; opacity:0; transition:0.3s; } .visualizer.active { opacity:1; } .bar { width:6px; background:#00ff88; border-radius:3px; animation:bounce 0.5s infinite alternate; } .bar:nth-child(1){animation-delay:0.1s;height:40%;} .bar:nth-child(2){animation-delay:0.3s;height:100%;} .bar:nth-child(3){animation-delay:0.0s;height:60%;background:#00bfff;} .bar:nth-child(4){animation-delay:0.2s;height:90%;background:#00bfff;} .bar:nth-child(5){animation-delay:0.4s;height:50%;} @keyframes bounce{from{transform:scaleY(0.3);}to{transform:scaleY(1);}}
        .song-title { font-size:1.2em; font-weight:bold; color:#00bfff; margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; } .artist-name { font-size:0.9em; color:#8888a0; margin-bottom:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .progress-container { display:flex; align-items:center; gap:10px; font-size:0.8em; color:#8888a0; margin-bottom:15px; } input[type="range"] { flex:1; accent-color:#00bfff; height:4px; background:#333; border-radius:5px; outline:none; cursor:pointer; }
        .controls { display:flex; justify-content:center; align-items:center; gap:15px; } .controls button { background:none; border:none; color:#00bfff; font-size:22px; cursor:pointer; transition:0.2s; } #playBtn { font-size:40px; } .controls button:active { transform:scale(0.9); color:#fff; }
        .list-container { display:none; width:90%; max-width:350px; text-align:left; } .list-container.active { display:block; }
        .result-item { background:#1a1a24; padding:10px; border-radius:10px; margin-bottom:10px; display:flex; align-items:center; gap:12px; cursor:pointer; border:1px solid #2d2d3d; transition:0.2s; } .result-item.playing-now { border-color:#00ff88; background:#252535; } .result-thumb { width:50px; height:50px; border-radius:5px; object-fit:cover; } .result-info { display:flex; flex-direction:column; flex:1; overflow:hidden; } .result-title { font-size:0.9em; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#fff; } .result-artist { font-size:0.75em; color:#8888a0; }
        .icon-btn { background:none; border:none; font-size:18px; cursor:pointer; padding:0 5px; color:#888; transition:0.3s; } .icon-btn.liked { color:#ff0055; transform:scale(1.1); }
        #lyricsModal { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(15,15,19,0.95); border-radius:20px; z-index:100; flex-direction:column; align-items:center; padding:20px; box-sizing:border-box; border:1px solid #00bfff; } #lyricsText { width:100%; flex:1; overflow-y:auto; color:#ccc; text-align:center; white-space:pre-line; line-height:1.8; font-size:0.9em; margin-top:15px; }
        .settings-card { background:#1a1a24; padding:15px; border-radius:10px; border:1px solid #2d2d3d; margin-bottom:10px; } .settings-card h3 { margin-top:0; color:#00bfff; font-size:1em; }
    </style>
</head>
<body>
    <p id="systemStatus" style="color:#00ff88; font-size:12px; font-weight:bold; background:#2d2d3d; padding:5px 10px; border-radius:5px;">System Stable 🟢</p>
    <div class="player-container">
        <div id="lyricsModal"><button onclick="document.getElementById('lyricsModal').style.display='none'" style="align-self:flex-end; background:red; color:#fff; border:none; padding:5px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">X Close</button><h3 style="color:#00ff88; margin-top:10px;">Lyrics</h3><div id="lyricsText">Loading lyrics...</div></div>
        <div class="search-box"><input type="text" id="searchInput" placeholder="Search song..." onkeypress="if(event.key==='Enter'){searchAll();this.blur();}"><button onclick="searchAll()">Search</button></div>
        <div class="tabs-container"><div class="tabs"><div class="tab active" id="tab-saavn" onclick="switchTab('saavn')">🎵 Saavn</div><div class="tab" id="tab-yt" onclick="switchTab('yt')">🎥 YT</div><div class="tab" id="tab-fav" onclick="switchTab('fav'); loadFavorites();">❤️ Favs</div><div class="tab" id="tab-off" onclick="switchTab('off'); loadOffline();">📥 Offline</div><div class="tab" id="tab-set" onclick="switchTab('set')">⚙️ Settings</div></div></div>
        <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=600&auto=format&fit=crop" id="cover" class="album-art">
        <div class="visualizer" id="visualizer"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        <div class="song-title" id="title">CNMW Pro</div><div class="artist-name" id="artist">Pick a vibe!</div><audio id="audio"></audio>
        <div class="progress-container"><span id="currentTime">0:00</span><input type="range" id="progressBar" value="0" max="100"><span id="totalTime">0:00</span></div>
        <div class="controls"><button onclick="toggleLoop()" id="loopBtn" title="Loop">🔁</button><button onclick="playPrev()" title="Prev">⏮️</button><button onclick="togglePlay()" id="playBtn">▶️</button><button onclick="playNext()" title="Next">⏭️</button><button onclick="saveToApp()" title="Download">📥</button><button onclick="fetchLyrics()" title="Lyrics">📜</button></div>
        <p id="statusMessage" style="color:#00bfff; font-size:0.8em; margin-top:10px;"></p>
    </div>
    <div class="list-container active" id="list-saavn"></div><div class="list-container" id="list-yt"></div><div class="list-container" id="list-fav"></div><div class="list-container" id="list-off"></div>
    <div class="list-container" id="list-set"><div class="settings-card"><h3 id="storageTitleUI">🗑️ Storage & Fixes</h3><button onclick="clearAppCache()" style="width:100%; padding:10px; background:#ff4d4d; color:#fff; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Reset App Data</button></div></div>
    <script>
        window.onerror=function(m){document.getElementById('systemStatus').innerText="Minor Error 🟡";return true;};
        const audio=document.getElementById('audio'),playBtn=document.getElementById('playBtn'),loopBtn=document.getElementById('loopBtn'),title=document.getElementById('title'),artist=document.getElementById('artist'),cover=document.getElementById('cover'),statusMsg=document.getElementById('statusMessage'),progressBar=document.getElementById('progressBar'),currentTimeEl=document.getElementById('currentTime'),totalTimeEl=document.getElementById('totalTime'),visualizer=document.getElementById('visualizer'),MY_SERVER_URL="https://cnmw.onrender.com";
        function getSafeDB(k){try{let d=JSON.parse(localStorage.getItem(k));return Array.isArray(d)?d:[];}catch(e){return [];}}
        let saavnResults=[],ytResults=[],favorites=getSafeDB('cnmw_favs'),offlineDb=getSafeDB('cnmw_offline'),currentQueue=[],currentIndex=0,currentTrack=null;
        function switchTab(p){['saavn','yt','fav','off','set'].forEach(t=>{document.getElementById(`tab-${t}`).className=p===t?'tab active':'tab';document.getElementById(`list-${t}`).className=p===t?'list-container active':'list-container';});}
        function isFav(id){return favorites.some(s=>s.id===id);}
        function searchAll(){let q=document.getElementById('searchInput').value;if(!q)return;statusMsg.innerText="Searching... 🚀";switchTab('saavn');fetchSaavn(q);fetchYT(q);}
        async function fetchSaavn(q){
            let c=document.getElementById('list-saavn');c.innerHTML="<p style='text-align:center;'>Fetching HQ...</p>";
            try{let r=await fetch(`${MY_SERVER_URL}/api/saavn?q=${encodeURIComponent(q)}`),j=await r.json(),s=j.data?.results||j.data||j.results||[];
            if(s.length>0){saavnResults=[];c.innerHTML="";s.forEach((x,i)=>{let t=String(x.name||x.title||"Unk"),a=String(x.primaryArtists||x.singers||"Unk"),th=x.image?(Array.isArray(x.image)?x.image[x.image.length-1].link||x.image[x.image.length-1].url:x.image):"https://via.placeholder.com/50",dl=x.downloadUrl||x.media_url,u=dl?(Array.isArray(dl)?dl[dl.length-1].link||dl[dl.length-1].url:dl):"",id=String(x.id||t);if(!u)return;saavnResults.push({id,url:u,title:t,artist:a,thumb:th});let ht=isFav(id)?'❤️':'🤍',lc=isFav(id)?'liked':'',st=t.replace(/'/g,"\\'").replace(/"/g,"&quot;"),sa=a.replace(/'/g,"\\'").replace(/"/g,"&quot;");
            let d=document.createElement('div');d.className='result-item';d.id=`item-saavn-${i}`;d.innerHTML=`<img src="${th}" class="result-thumb" onclick="playFromQueue(${i},'saavn')"><div class="result-info" onclick="playFromQueue(${i},'saavn')"><span class="result-title">${t}</span><span class="result-artist">${a}</span></div><button class="icon-btn ${lc}" onclick="toggleLike(this,'${id}','${u}','${st}','${sa}','${th}')">${ht}</button>`;c.appendChild(d);});statusMsg.innerText="Ready!";}else c.innerHTML="<p style='color:#ff4d4d;text-align:center;'>No songs.</p>";}catch(e){c.innerHTML=`<p style='color:#ff4d4d;text-align:center;'>Fetch failed.</p>`;}
        }
        async function fetchYT(q){
            let c=document.getElementById('list-yt');c.innerHTML="<p style='text-align:center;'>Bypassing YT... 🎥</p>";
            try{let r=await fetch(`${MY_SERVER_URL}/api/yt?q=${encodeURIComponent(q)}`),d=await r.json();if(d.items&&d.items.length>0){ytResults=[];c.innerHTML="";d.items.forEach((x,i)=>{ytResults.push({id:x.videoId,title:x.title,artist:x.author,thumb:x.videoThumbnails[0].url});let st=x.title.replace(/'/g,"\\'").replace(/"/g,"&quot;"),sa=x.author.replace(/'/g,"\\'").replace(/"/g,"&quot;");let d=document.createElement('div');d.className='result-item';d.id=`item-yt-${i}`;d.innerHTML=`<img src="${x.videoThumbnails[0].url}" class="result-thumb" onclick="playYT('${x.videoId}','${st}','${sa}','${x.videoThumbnails[0].url}',${i})"><div class="result-info" onclick="playYT('${x.videoId}','${st}','${sa}','${x.videoThumbnails[0].url}',${i})"><span class="result-title">${x.title}</span><span class="result-artist">${x.author}</span><span style="font-size:10px;color:#ff4d4d;background:#333;padding:2px;border-radius:3px;width:max-content;">🎥 YT Backend</span></div>`;c.appendChild(d);});}else c.innerHTML="<p style='color:#ff4d4d;text-align:center;'>No YT videos.</p>";}catch(e){c.innerHTML="<p style='color:#ff4d4d;text-align:center;'>YT Error.</p>";}
        }
        async function playYT(id,t,a,th,i){statusMsg.innerText="Extracting YT... 🎧";currentTrack={id,url:"",title:t,artist:a,thumb:th,isYT:true};title.innerText=t;artist.innerText=a;cover.src=th;currentQueue=ytResults;currentIndex=i;document.querySelectorAll('.result-item').forEach(e=>e.classList.remove('playing-now'));if(document.getElementById(`item-yt-${i}`))document.getElementById(`item-yt-${i}`).classList.add('playing-now');
            try{let r=await fetch(`${MY_SERVER_URL}/api/yt/stream?id=${id}`),d=await r.json();if(d.adaptiveFormats&&d.adaptiveFormats.length>0){audio.src=d.adaptiveFormats[0].url;startAudio();}else statusMsg.innerText="Stream failed.";}catch(e){statusMsg.innerText="Extraction error.";}
        }
        function playFromQueue(i,ctx){let l=ctx==='saavn'?saavnResults:ctx==='fav'?favorites:offlineDb;if(!l||!l[i])return;currentQueue=l;currentIndex=i;let s=l[i];document.querySelectorAll('.result-item').forEach(e=>e.classList.remove('playing-now'));let el=document.getElementById(`item-${ctx}-${i}`);if(el)el.classList.add('playing-now');playAudio(s.id,s.url,s.title,s.artist,s.thumb);}
        function playNext(){if(currentTrack&&currentTrack.isYT)return statusMsg.innerText="Autoplay for YT soon!";if(currentIndex<currentQueue.length-1)playFromQueue(currentIndex+1,currentQueue===saavnResults?'saavn':currentQueue===favorites?'fav':'off');else statusMsg.innerText="Queue Ended 🛑";}
        function playPrev(){if(currentTrack&&currentTrack.isYT)return;if(currentIndex>0)playFromQueue(currentIndex-1,currentQueue===saavnResults?'saavn':currentQueue===favorites?'fav':'off');}
        audio.addEventListener('ended',()=>{if(!audio.loop)playNext();});
        async function fetchLyrics(){if(!currentTrack)return statusMsg.innerText="Play a song first!";if(currentTrack.isYT)return statusMsg.innerText="No lyrics for YT.";let m=document.getElementById('lyricsModal'),t=document.getElementById('lyricsText');m.style.display='flex';t.innerText="Extracting... ⏳";try{let r=await fetch(`https://saavn.me/lyrics?id=${currentTrack.id}`),d=await r.json();if(d.status==="SUCCESS"&&d.data.lyrics)t.innerHTML=d.data.lyrics.replace(/<br>/g,"\n");else t.innerText="No lyrics 🥲";}catch(e){t.innerText="Error fetching lyrics.";}}
        function playAudio(id,u,t,a,th){currentTrack={id,url:u,title:t,artist:a,thumb:th,isYT:false};title.innerText=t;artist.innerText=a;cover.src=th;statusMsg.innerText="Playing... 🎵";audio.src=u;startAudio();}
        function startAudio(){audio.play().then(()=>{playBtn.innerText="⏸";visualizer.classList.add('active');}).catch(()=>{playBtn.innerText="▶️";});}
        function togglePlay(){if(!audio.src)return;if(audio.paused){audio.play();playBtn.innerText="⏸";visualizer.classList.add('active');}else{audio.pause();playBtn.innerText="▶️";visualizer.classList.remove('active');}}
        function toggleLoop(){audio.loop=!audio.loop;loopBtn.style.color=audio.loop?"#00ff00":"gray";}
        audio.addEventListener('timeupdate',()=>{if(audio.duration){progressBar.value=(audio.currentTime/audio.duration)*100;let m=Math.floor(audio.currentTime/60),s=Math.floor(audio.currentTime%60);currentTimeEl.innerText=`${m}:${s<10?'0':''}${s}`;let tm=Math.floor(audio.duration/60),ts=Math.floor(audio.duration%60);if(!isNaN(tm))totalTimeEl.innerText=`${tm}:${ts<10?'0':''}${ts}`;}});
        progressBar.addEventListener('input',()=>{if(audio.duration)audio.currentTime=(progressBar.value/100)*audio.duration;});
        function toggleLike(b,id,u,t,a,th){b.classList.toggle('liked');if(b.classList.contains('liked')){b.innerText='❤️';favorites.push({id,url:u,title:t,artist:a,thumb:th});}else{b.innerText='🤍';favorites=favorites.filter(s=>s.id!==id);}localStorage.setItem('cnmw_favs',JSON.stringify(favorites));loadFavorites();}
        function loadFavorites(){let c=document.getElementById('list-fav');c.innerHTML="";if(!favorites||!favorites.length)return;favorites.forEach((s,i)=>{let st=String(s.title).replace(/'/g,"\\'").replace(/"/g,"&quot;"),sa=String(s.artist).replace(/'/g,"\\'").replace(/"/g,"&quot;");let d=document.createElement('div');d.className='result-item';d.id=`item-fav-${i}`;d.innerHTML=`<img src="${s.thumb}" class="result-thumb" onclick="playFromQueue(${i},'fav')"><div class="result-info" onclick="playFromQueue(${i},'fav')"><span class="result-title">${s.title}</span><span class="result-artist">${s.artist}</span></div><button class="icon-btn liked" onclick="toggleLike(this,'${s.id}','${s.url}','${st}','${sa}','${s.thumb}')">❤️</button>`;c.appendChild(d);});}
        async function saveToApp(){if(!currentTrack)return;if(currentTrack.isYT)return statusMsg.innerText="Cannot offline YT videos yet.";statusMsg.innerText="Saving... ⏳";try{const c=await caches.open('cnmw-music-cache');await c.add(currentTrack.url);if(!offlineDb.some(s=>s.id===currentTrack.id)){offlineDb.push(currentTrack);localStorage.setItem('cnmw_offline',JSON.stringify(offlineDb));}statusMsg.innerText="Saved Offline! 📥";loadOffline();}catch(e){statusMsg.innerText="Failed to save.";}}
        function loadOffline(){let c=document.getElementById('list-off');c.innerHTML="";if(!offlineDb||!offlineDb.length)return;offlineDb.forEach((s,i)=>{let d=document.createElement('div');d.className='result-item';d.id=`item-off-${i}`;d.innerHTML=`<img src="${s.thumb}" class="result-thumb" onclick="playFromQueue(${i},'off')"><div class="result-info" onclick="playFromQueue(${i},'off')"><span class="result-title">${s.title}</span><span class="result-artist">${s.artist}</span></div><button class="icon-btn" onclick="removeOffline('${s.id}','${s.url}')" title="Delete">🗑️</button>`;c.appendChild(d);});}
        async function removeOffline(id,u){try{const c=await caches.open('cnmw-music-cache');await c.delete(u);offlineDb=offlineDb.filter(s=>s.id!==id);localStorage.setItem('cnmw_offline',JSON.stringify(offlineDb));statusMsg.innerText="Deleted 🗑️";loadOffline();}catch(e){console.error(e);}}
        function clearAppCache(){if(confirm("Reset App? Deletes Favs & Downloads.")){localStorage.clear();caches.keys().then(k=>k.forEach(c=>caches.delete(c)));alert("Cleared! Restarting...");location.reload();}}
        loadFavorites();loadOffline();
    </script>
</body>
</html>
