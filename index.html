<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNMW - Bulletproof Premium</title>
    
    <!-- 🚨 HACKER CRASH DETECTOR 🚨 -->
    <script>
        window.onerror = function(msg, url, line) {
            if (msg.includes("searchAll") || msg.includes("switchTab") || msg.includes("handleEnter")) {
                document.body.innerHTML = `
                <div style="text-align:center; padding:40px; color:white; font-family:sans-serif; background:#0f0f13; height:100vh;">
                    <h1 style="color:#ffcc00;">⚠️ Code Miss Ayyindi Bro!</h1>
                    <p style="color:#888;">Nuvvu copy chesetappudu kinda unna main Script cut aipoyindi.</p>
                    <p style="color:#00bfff;">Please naa message lo unna "Copy" icon meeda click chesi, motham paste cheyi!</p>
                </div>`;
                return true;
            }
            document.body.innerHTML = `
            <div style="text-align:center; padding:40px; color:white; font-family:sans-serif; background:#0f0f13; height:100vh;">
                <h1 style="color:#ff4d4d;">App Crashed 💥</h1>
                <p style="color:#ff4d4d; font-size:12px; background:#000; padding:10px;">Error: ${msg} (Line: ${line})</p>
                <button onclick="localStorage.clear(); location.reload();" style="padding:15px; background:#00bfff; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:20px;">Fix & Restart</button>
            </div>`;
            return true;
        };
    </script>

    <style>
        body { background-color: #0f0f13; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px 0; min-height: 100vh; }
        .player-container { background: #1a1a24; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 191, 255, 0.15); width: 90%; max-width: 350px; text-align: center; border: 1px solid #2d2d3d; margin-bottom: 20px; position: relative;}
        
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-box input { flex: 1; padding: 10px; border-radius: 10px; border: none; background: #2d2d3d; color: white; outline: none; }
        .search-box button { padding: 10px 15px; border-radius: 10px; border: none; background: #00bfff; color: white; font-weight: bold; cursor: pointer; }
        
        .tabs-container { width: 100%; overflow-x: auto; margin-bottom: 15px; border-radius: 10px; background: #2d2d3d; }
        .tabs { display: flex; width: max-content; min-width: 100%; }
        .tab { flex: 1; padding: 10px 15px; text-align: center; cursor: pointer; font-size: 0.8em; font-weight: bold; color: #8888a0; transition: 0.3s; white-space: nowrap; }
        .tab.active { background: #00bfff; color: white; }

        .album-art { width: 100%; height: 250px; background: #252535; border-radius: 15px; margin-bottom: 10px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .visualizer { display: flex; gap: 5px; justify-content: center; align-items: flex-end; height: 30px; margin-bottom: 15px; opacity: 0; transition: 0.3s; }
        .visualizer.active { opacity: 1; }
        .bar { width: 6px; background: #00ff88; border-radius: 3px; animation: bounce 0.5s infinite alternate; }
        .bar:nth-child(1) { animation-delay: 0.1s; height: 40%; }
        .bar:nth-child(2) { animation-delay: 0.3s; height: 100%; }
        .bar:nth-child(3) { animation-delay: 0.0s; height: 60%; background: #00bfff;}
        .bar:nth-child(4) { animation-delay: 0.2s; height: 90%; background: #00bfff;}
        .bar:nth-child(5) { animation-delay: 0.4s; height: 50%; }
        @keyframes bounce { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }

        .song-title { font-size: 1.2em; font-weight: bold; color: #00bfff; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .artist-name { font-size: 0.9em; color: #8888a0; margin-bottom: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .progress-container { display: flex; align-items: center; gap: 10px; font-size: 0.8em; color: #8888a0; margin-bottom: 15px; }
        input[type="range"] { flex: 1; accent-color: #00bfff; height: 4px; background: #333; border-radius: 5px; outline: none; cursor: pointer; }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .controls button { background: none; border: none; color: #00bfff; font-size: 22px; cursor: pointer; transition: 0.2s; }
        #playBtn { font-size: 40px; }
        .controls button:active { transform: scale(0.9); color: white; }

        .list-container { display: none; width: 90%; max-width: 350px; text-align: left; }
        .list-container.active { display: block; }
        
        .result-item { background: #1a1a24; padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; border: 1px solid #2d2d3d; transition: 0.2s; }
        .result-item.playing-now { border-color: #00ff88; background: #252535; }
        .result-thumb { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
        .result-info { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .result-title { font-size: 0.9em; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white;}
        .result-artist { font-size: 0.75em; color: #8888a0; }
        .icon-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 0 5px; color: #888; transition: 0.3s; }
        .icon-btn.liked { color: #ff0055; transform: scale(1.1); }

        #lyricsModal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,15,19,0.95); border-radius: 20px; z-index: 100; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; border: 1px solid #00bfff;}
        #lyricsText { width: 100%; flex: 1; overflow-y: auto; color: #ccc; text-align: center; white-space: pre-line; line-height: 1.8; font-size: 0.9em; margin-top: 15px;}
        .settings-card { background: #1a1a24; padding: 15px; border-radius: 10px; border: 1px solid #2d2d3d; margin-bottom: 10px; }
        .settings-card h3 { margin-top: 0; color: #00bfff; font-size: 1em; }
    </style>
</head>
<body>

    <p id="systemStatus" style="color:#ff4d4d; font-size:12px; font-weight:bold;">System Offline 🔴 (Code Incomplete)</p>

    <div class="player-container">
        <!-- LYRICS MODAL -->
        <div id="lyricsModal">
            <button onclick="document.getElementById('lyricsModal').style.display='none'" style="align-self: flex-end; background: red; color: white; border: none; padding: 5px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;">X Close</button>
            <h3 style="color:#00ff88; margin-top:10px;">Lyrics</h3>
            <div id="lyricsText">Loading lyrics...</div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search song..." onkeypress="handleEnter(event)">
            <button id="searchBtnUI" onclick="searchAll()">Search</button>
        </div>

        <div class="tabs-container">
            <div class="tabs">
                <div class="tab active" id="tab-saavn" onclick="switchTab('saavn')">🎵 Saavn</div>
                <div class="tab" id="tab-yt" onclick="switchTab('yt')">🎥 YT</div>
                <div class="tab" id="tab-fav" onclick="switchTab('fav'); loadFavorites();">❤️ Favs</div>
                <div class="tab" id="tab-off" onclick="switchTab('off'); loadOffline();">📥 Offline</div>
                <div class="tab" id="tab-set" onclick="switchTab('set')">⚙️ Settings</div>
            </div>
        </div>

        <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=600&auto=format&fit=crop" id="cover" class="album-art">
        
        <div class="visualizer" id="visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div class="song-title" id="title">CNMW Pro Edition</div>
        <div class="artist-name" id="artist">Pick a vibe!</div>
        
        <audio id="audio"></audio>

        <div class="progress-container">
            <span id="currentTime">0:00</span>
            <input type="range" id="progressBar" value="0" max="100">
            <span id="totalTime">0:00</span>
        </div>

        <div class="controls">
            <button onclick="toggleLoop()" id="loopBtn" title="Loop">🔁</button>
            <button onclick="playPrev()" title="Previous">⏮️</button>
            <button onclick="togglePlay()" id="playBtn">▶️</button>
            <button onclick="playNext()" title="Next">⏭️</button>
            <button onclick="saveToApp()" title="Download">📥</button>
            <button onclick="fetchLyrics()" title="Lyrics">📜</button>
        </div>
        <p id="statusMessage" style="color: #00bfff; font-size: 0.8em; margin-top: 10px;"></p>
    </div>

    <div class="list-container active" id="list-saavn"></div>
    <div class="list-container" id="list-yt"></div>
    <div class="list-container" id="list-fav"></div>
    <div class="list-container" id="list-off"></div>
    
    <div class="list-container" id="list-set">
        <div class="settings-card">
            <h3 id="langTitleUI">🌍 App Language</h3>
            <select id="langSelect" onchange="changeLang(this.value)" style="width: 100%; padding: 10px; background: #2d2d3d; color: white; border: none; border-radius: 5px;">
                <option value="en">English</option>
                <option value="te">తెలుగు (Telugu)</option>
            </select>
        </div>
        <div class="settings-card">
            <h3 id="storageTitleUI">🗑️ Storage (Fix Errors)</h3>
            <button onclick="clearAppCache()" style="width:100%; padding:10px; background:#ff4d4d; color:white; border:none; border-radius:5px; cursor: pointer; font-weight:bold;">Clear App Data / Fix Freeze</button>
        </div>
    </div>

    <!-- 🚨 MAIN BRAIN: IDI MISS AITHE APP PANICHEYADU 🚨 -->
    <script>
        // Set System to Ready Mode if script loads successfully
        document.getElementById('systemStatus').innerText = "System Ready 🟢";
        document.getElementById('systemStatus').style.color = "#00ff88";

        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const loopBtn = document.getElementById('loopBtn');
        const title = document.getElementById('title');
        const artist = document.getElementById('artist');
        const cover = document.getElementById('cover');
        const statusMsg = document.getElementById('statusMessage');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const visualizer = document.getElementById('visualizer');

        const MY_SERVER_URL = "https://cnmw.onrender.com";

        function getSafeDB(key) {
            try { 
                let data = JSON.parse(localStorage.getItem(key));
                return Array.isArray(data) ? data : []; 
            } catch(e) { return []; }
        }

        let saavnResults = [];
        let favorites = getSafeDB('cnmw_favs');
        let offlineDb = getSafeDB('cnmw_offline');
        let currentQueue = [];
        let currentIndex = 0;
        let currentTrack = null;

        const i18n = {
            en: { search: "Search", t1: "🎵 Saavn", t2: "🎥 YT", t3: "❤️ Favs", t4: "📥 Offline", t5: "⚙️ Settings", lang: "🌍 App Language", store: "🗑️ Storage" },
            te: { search: "వెతకండి", t1: "🎵 సావన్", t2: "🎥 యూట్యూబ్", t3: "❤️ ఇష్టమైనవి", t4: "📥 ఆఫ్‌లైన్", t5: "⚙️ సెట్టింగ్స్", lang: "🌍 యాప్ భాష", store: "🗑️ స్టోరేజ్ క్లియర్" }
        };

        function changeLang(lang) {
            if(!i18n[lang]) lang = 'en'; 
            document.getElementById('searchBtnUI').innerText = i18n[lang].search;
            document.getElementById('tab-saavn').innerText = i18n[lang].t1;
            document.getElementById('tab-yt').innerText = i18n[lang].t2;
            document.getElementById('tab-fav').innerText = i18n[lang].t3;
            document.getElementById('tab-off').innerText = i18n[lang].t4;
            document.getElementById('tab-set').innerText = i18n[lang].t5;
            document.getElementById('langTitleUI').innerText = i18n[lang].lang;
            document.getElementById('storageTitleUI').innerText = i18n[lang].store;
            localStorage.setItem('cnmw_lang', lang);
        }

        let savedLang = localStorage.getItem('cnmw_lang') || 'en';
        document.getElementById('langSelect').value = savedLang;
        changeLang(savedLang);

        function handleEnter(e) {
            if (e.key === 'Enter') { searchAll(); document.getElementById('searchInput').blur(); }
        }

        function switchTab(platform) {
            ['saavn', 'yt', 'fav', 'off', 'set'].forEach(p => {
                document.getElementById(`tab-${p}`).className = platform === p ? 'tab active' : 'tab';
                document.getElementById(`list-${p}`).className = platform === p ? 'list-container active' : 'list-container';
            });
        }

        function isFav(id) { return favorites.some(song => song.id === id); }

        function searchAll() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            statusMsg.innerText = "Searching... 🚀";
            switchTab('saavn');
            fetchSaavn(query);
        }

        async function fetchSaavn(query) {
            const container = document.getElementById('list-saavn');
            container.innerHTML = "<p style='text-align:center;'>Fetching Magic...</p>";
            try {
                const response = await fetch(`${MY_SERVER_URL}/api/saavn?q=${encodeURIComponent(query)}`);
                const json = await response.json();
                let songs = json.data?.results || json.data || json.results || [];

                if (songs.length > 0) {
                    saavnResults = []; 
                    container.innerHTML = "";
                    songs.forEach((song, index) => {
                        let sTitle = String(song.name || song.title || "Unknown");
                        let sArtist = String(song.primaryArtists || song.singers || "Unknown");
                        let sThumb = song.image ? (Array.isArray(song.image) ? song.image[song.image.length-1].link || song.image[song.image.length-1].url : song.image) : "https://via.placeholder.com/50";
                        let dl = song.downloadUrl || song.media_url;
                        let sUrl = dl ? (Array.isArray(dl) ? dl[dl.length-1].link || dl[dl.length-1].url : dl) : "";
                        let sId = String(song.id || sTitle);

                        if (!sUrl) return;
                        saavnResults.push({ id: sId, url: sUrl, title: sTitle, artist: sArtist, thumb: sThumb });

                        let heart = isFav(sId) ? '❤️' : '🤍';
                        let likedClass = isFav(sId) ? 'liked' : '';
                        let safeTitle = sTitle.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                        let safeArtist = sArtist.replace(/'/g, "\\'").replace(/"/g, "&quot;");

                        const item = document.createElement('div');
                        item.className = 'result-item'; item.id = `item-saavn-${index}`;
                        item.innerHTML = `
                            <img src="${sThumb}" class="result-thumb" onclick="playFromQueue(${index}, 'saavn')">
                            <div class="result-info" onclick="playFromQueue(${index}, 'saavn')">
                                <span class="result-title">${sTitle}</span><span class="result-artist">${sArtist}</span>
                            </div>
                            <button class="icon-btn ${likedClass}" onclick="toggleLike(this, '${sId}', '${sUrl}', '${safeTitle}', '${safeArtist}', '${sThumb}')">${heart}</button>
                        `;
                        container.appendChild(item);
                    });
                    statusMsg.innerText = "Queue Ready!";
                } else container.innerHTML = "<p style='color:#ff4d4d; text-align:center;'>No songs found.</p>";
            } catch (err) { container.innerHTML = `<p style='color:#ff4d4d; text-align:center;'>Failed to fetch.</p>`; }
        }

        function playFromQueue(index, context) {
            let list = context === 'saavn' ? saavnResults : context === 'fav' ? favorites : offlineDb;
            if(list.length === 0 || !list[index]) return;
            currentQueue = list; currentIndex = index; let song = list[index];

            document.querySelectorAll('.result-item').forEach(el => el.classList.remove('playing-now'));
            let activeEl = document.getElementById(`item-${context}-${index}`);
            if(activeEl) activeEl.classList.add('playing-now');

            playAudio(song.id, song.url, song.title, song.artist, song.thumb);
        }

        function playNext() {
            if (currentIndex < currentQueue.length - 1) playFromQueue(currentIndex + 1, currentQueue === saavnResults ? 'saavn' : currentQueue === favorites ? 'fav' : 'off');
            else statusMsg.innerText = "Queue Ended 🛑";
        }

        function playPrev() {
            if (currentIndex > 0) playFromQueue(currentIndex - 1, currentQueue === saavnResults ? 'saavn' : currentQueue === favorites ? 'fav' : 'off');
        }

        audio.addEventListener('ended', () => { if (!audio.loop) playNext(); });

        async function fetchLyrics() {
            if(!currentTrack) return statusMsg.innerText = "Play a song first!";
            const modal = document.getElementById('lyricsModal');
            const textEl = document.getElementById('lyricsText');
            modal.style.display = 'flex'; textEl.innerText = "Extracting lyrics... ⏳";
            try {
                const response = await fetch(`https://saavn.me/lyrics?id=${currentTrack.id}`);
                const data = await response.json();
                if(data.status === "SUCCESS" && data.data.lyrics) textEl.innerHTML = data.data.lyrics.replace(/<br>/g, "\n");
                else textEl.innerText = "Sorry, lyrics not available 🥲";
            } catch(e) { textEl.innerText = "Failed to fetch lyrics."; }
        }

        function playAudio(id, audioUrl, sTitle, sArtist, sThumb) {
            currentTrack = { id, url: audioUrl, title: sTitle, artist: sArtist, thumb: sThumb };
            title.innerText = sTitle; artist.innerText = sArtist; cover.src = sThumb; statusMsg.innerText = "Playing... 🎵";
            audio.src = audioUrl; startAudio();
        }

        function startAudio() { audio.play().then(() => { playBtn.innerText = "⏸"; visualizer.classList.add('active'); }).catch(() => { playBtn.innerText = "▶️"; }); }
        function togglePlay() { if (!audio.src) return; if (audio.paused) { audio.play(); playBtn.innerText = "⏸"; visualizer.classList.add('active'); } else { audio.pause(); playBtn.innerText = "▶️"; visualizer.classList.remove('active'); } }
        function toggleLoop() { audio.loop = !audio.loop; loopBtn.style.color = audio.loop ? "#00ff00" : "gray"; }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                progressBar.value = (audio.currentTime / audio.duration) * 100;
                let min = Math.floor(audio.currentTime / 60); let sec = Math.floor(audio.currentTime % 60);
