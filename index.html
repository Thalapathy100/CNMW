<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CNMW - Bypass Pro</title>
<style>
body{background:url('https://images.unsplash.com/photo-1511527661048-7fe73d85e9a4?q=80&w=1080&auto=format&fit=crop') center/cover fixed;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;margin:0;padding:20px 0;min-height:100vh;}
.box{background:rgba(20,20,30,0.4);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);padding:25px;border-radius:20px;width:90%;max-width:350px;text-align:center;border:1px solid rgba(255,255,255,0.1);margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.5);}
.row{display:flex;gap:10px;margin-bottom:15px;} input{flex:1;padding:10px;border-radius:10px;border:none;background:rgba(0,0,0,0.5);color:#fff;outline:none;} button{padding:10px 15px;border-radius:10px;border:none;background:#0bf;color:#fff;font-weight:bold;cursor:pointer;}
.tabs{display:flex;width:100%;overflow-x:auto;background:rgba(0,0,0,0.5);border-radius:10px;margin-bottom:15px;} .tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:bold;color:#aaa;cursor:pointer;white-space:nowrap;} .tab.active{background:#0bf;color:#fff;}
.art{width:100%;height:250px;background:#000;border-radius:15px;margin-bottom:10px;object-fit:cover;box-shadow:0 10px 20px rgba(0,0,0,0.6);}
.vis{display:flex;gap:6px;justify-content:center;align-items:flex-end;height:35px;margin-bottom:15px;opacity:0;} .vis.active{opacity:1;} .bar{width:6px;border-radius:3px;animation:b 0.5s infinite alternate;}
.bar:nth-child(1){animation-delay:0.1s;height:40%;background:#f05;} .bar:nth-child(2){animation-delay:0.3s;height:100%;background:#0f8;} .bar:nth-child(3){animation-delay:0.0s;height:60%;background:#0bf;} .bar:nth-child(4){animation-delay:0.2s;height:90%;background:#fc0;} .bar:nth-child(5){animation-delay:0.4s;height:50%;background:#0f8;} @keyframes b{from{transform:scaleY(0.3);}to{transform:scaleY(1);}}
.title{font-size:1.3em;font-weight:bold;color:#fff;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;} .artist{font-size:0.9em;color:#ddd;margin-bottom:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ctrl{display:flex;justify-content:center;align-items:center;gap:15px;} .ctrl button{background:none;color:#fff;font-size:22px;} #playBtn{font-size:45px;color:#0bf;}
.list{display:none;width:90%;max-width:350px;text-align:left;} .list.active{display:block;}
.item{background:rgba(20,20,30,0.6);backdrop-filter:blur(10px);padding:10px;border-radius:10px;margin-bottom:10px;display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,0.1);} .item.active{border-color:#0f8;background:rgba(0,255,136,0.1);} .item img{width:50px;height:50px;border-radius:5px;object-fit:cover;}
.info{display:flex;flex-direction:column;flex:1;overflow:hidden;} .info span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;} .info .t{font-size:14px;font-weight:bold;color:#fff;} .info .a{font-size:12px;color:#ccc;}
.like{background:none;border:none;font-size:18px;color:#aaa;} .like.liked{color:#f05;}
#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,10,15,0.95);z-index:100;flex-direction:column;padding:20px;box-sizing:border-box;}
.card{background:rgba(20,20,30,0.6);padding:15px;border-radius:10px;margin-bottom:10px;} .card h3{margin-top:0;color:#0bf;font-size:1em;}
</style></head><body>
<div class="box">
<div id="modal"><button onclick="this.parentElement.style.display='none'" style="background:#f44;color:#fff;align-self:end;padding:5px;border-radius:5px;border:none;">X Close</button><h3 style="color:#0f8;">Lyrics</h3><div id="lyr" style="overflow-y:auto;color:#fff;white-space:pre-line;margin-top:15px;"></div></div>
<div class="row"><input id="search" placeholder="Search song..." onkeypress="if(event.key==='Enter'){searchAll();this.blur();}"><button onclick="searchAll()">Search</button></div>
<div class="tabs"><div class="tab active" onclick="tab('saavn')">🎵 Saavn</div><div class="tab" onclick="tab('yt')">🎥 YT</div><div class="tab" onclick="tab('fav');ldFav();">❤️ Fav</div><div class="tab" onclick="tab('off');ldOff();">📥 Off</div><div class="tab" onclick="tab('set')">⚙️ Set</div></div>
<img id="cover" class="art" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=600&auto=format&fit=crop">
<div class="vis" id="vis"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
<div class="title" id="title">CNMW Premium</div><div class="artist" id="artist">Pick a vibe!</div><audio id="audio"></audio>
<div class="row" style="font-size:12px;color:#ddd;"><span id="ct">0:00</span><input type="range" id="prog" value="0" max="100"><span id="tt">0:00</span></div>
<div class="ctrl"><button id="lp" onclick="lp()">🔁</button><button onclick="prev()">⏮️</button><button id="playBtn" onclick="pl()">▶️</button><button onclick="nxt()">⏭️</button><button onclick="sav()">📥</button><button onclick="lyr()">📜</button></div>
<p id="msg" style="color:#0f8;font-size:12px;margin-top:10px;font-weight:bold;"></p></div>
<div class="list active" id="l-saavn"></div><div class="list" id="l-yt"></div><div class="list" id="l-fav"></div><div class="list" id="l-off"></div>
<div class="list" id="l-set"><div class="card"><h3>🌌 Theme</h3><select onchange="chTheme(this.value)" style="width:100%;padding:10px;background:#000;color:#fff;"><option value="car">Night Drive 🏎️</option><option value="rain">Rainy Mountain ⛰️</option><option value="beach">Sunset 🌅</option></select></div><div class="card"><button onclick="clr()" style="width:100%;padding:10px;background:#f44;color:#fff;font-weight:bold;border:none;border-radius:5px;">Reset App Data</button></div></div>
<script>
window.onerror=()=>{$('msg').innerText="Error handled.";return true;}; const $=id=>document.getElementById(id), au=$('audio'), URL="https://cnmw.onrender.com";
let resS=[], resY=[], fav=JSON.parse(localStorage.getItem('f'))||[], off=JSON.parse(localStorage.getItem('o'))||[], q=[], qI=0, cur=null;
const thms={car:"https://images.unsplash.com/photo-1511527661048-7fe73d85e9a4?q=80&w=1080",rain:"https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?q=80&w=1080",beach:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1080"};
function chTheme(v){document.body.style.backgroundImage=`url('${thms[v]}')`;localStorage.setItem('t',v);} let sTh=localStorage.getItem('t')||'car';chTheme(sTh);document.querySelector('select').value=sTh;
function tab(p){['saavn','yt','fav','off','set'].forEach(t=>{document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));event.target.classList.add('active');$(`l-${t}`).className=p===t?'list active':'list';});}
function searchAll(){let v=$('search').value;if(!v)return;$('msg').innerText="Searching... 🚀";tab('saavn');fS(v);fY(v);}
async function fS(v){$('l-saavn').innerHTML="<p>Loading HQ...</p>";try{let r=await fetch(`${URL}/api/saavn?q=${v}`),j=await r.json(),s=j.data?.results||[];if(s.length){resS=[];$('l-saavn').innerHTML="";s.forEach((x,i)=>{let t=x.name||x.title,a=x.primaryArtists||x.singers,th=x.image[2]?.link||x.image[0]?.link,u=x.downloadUrl?x.downloadUrl[x.downloadUrl.length-1].link:"",id=x.id;if(!u)return;resS.push({id,u,t,a,th});$('l-saavn').innerHTML+=`<div class="item" id="is-${i}"><img src="${th}" onclick="pq(${i},'s')"><div class="info" onclick="pq(${i},'s')"><span class="t">${t}</span><span class="a">${a}</span></div><button class="like ${fav.some(f=>f.id===id)?'liked':''}" onclick="lk(this,'${id}','${u}','${t.replace(/'/g,"")}','${a.replace(/'/g,"")}','${th}')">❤️</button></div>`;});$('msg').innerText="Ready!";}else $('l-saavn').innerHTML="None";}catch(e){$('l-saavn').innerHTML="Error";}}
async function fY(v){$('l-yt').innerHTML="<p>Bypassing YT...</p>";try{let r=await fetch(`${URL}/api/yt?q=${v}`),j=await r.json();if(j.items?.length){resY=[];$('l-yt').innerHTML="";j.items.forEach((x,i)=>{resY.push({id:x.videoId,t:x.title,a:x.author,th:x.videoThumbnails[0].url});$('l-yt').innerHTML+=`<div class="item" id="iy-${i}"><img src="${x.videoThumbnails[0].url}" onclick="py('${x.videoId}','${x.title.replace(/'/g,"")}','${x.author.replace(/'/g,"")}','${x.videoThumbnails[0].url}',${i})"><div class="info" onclick="py('${x.videoId}','${x.title.replace(/'/g,"")}','${x.author.replace(/'/g,"")}','${x.videoThumbnails[0].url}',${i})"><span class="t">${x.title}</span><span class="a">${x.author}</span><span style="font-size:10px;color:#0f8;background:#000;padding:2px;border-radius:3px;">🎥 Direct IP</span></div></div>`;});}else $('l-yt').innerHTML="None";}catch(e){$('l-yt').innerHTML="Error";}}
async function py(id,t,a,th,i){$('msg').innerText="Bypassing via Phone IP... 🎧";cur={id,u:"",t,a,th,isY:true};$('title').innerText=t;$('artist').innerText=a;$('cover').src=th;q=resY;qI=i;document.querySelectorAll('.item').forEach(e=>e.classList.remove('active'));if($(`iy-${i}`))$(`iy-${i}`).classList.add('active');let nds=[`https://pipedapi.kavin.rocks/streams/${id}`,`https://pipedapi.smnz.de/streams/${id}`,`https://api.piped.projectsegfau.lt/streams/${id}`];let fnd=false;for(let n of nds){try{let r=await fetch(n),d=await r.json(),s=d.audioStreams?.find(x=>x.mimeType.includes('mp4'));if(s){au.src=s.url;stA();fnd=true;$('msg').innerText="Stream Success 🟢";break;}}catch(e){}}if(!fnd)$('msg').innerText="Stream blocked. Retry.";}
function pq(i,c){let l=c==='s'?resS:c==='f'?fav:off;if(!l||!l[i])return;q=l;qI=i;let s=l[i];document.querySelectorAll('.item').forEach(e=>e.classList.remove('active'));let el=$(`is-${i}`);if(el)el.classList.add('active');cur={...s,isY:false};$('title').innerText=s.t;$('artist').innerText=s.a;$('cover').src=s.th;au.src=s.u;stA();}
function nxt(){if(cur?.isY)return;if(qI<q.length-1)pq(qI+1,q===resS?'s':q===fav?'f':'o');} function prev(){if(cur?.isY)return;if(qI>0)pq(qI-1,q===resS?'s':q===fav?'f':'o');} au.onended=()=>{if(!au.loop)nxt();};
async function lyr(){if(!cur||cur.isY)return;$('modal').style.display='flex';$('lyr').innerText="Loading...";try{let r=await fetch(`https://saavn.me/lyrics?id=${cur.id}`),d=await r.json();$('lyr').innerHTML=d.data?.lyrics?.replace(/<br>/g,"\n")||"No lyrics";}catch(e){$('lyr').innerText="Error";}}
function stA(){au.play().then(()=>{$('playBtn').innerText="⏸";$('vis').className="vis active";}).catch(()=>{});} function pl(){if(!au.src)return;if(au.paused)stA();else{au.pause();$('playBtn').innerText="▶️";$('vis').className="vis";}} function lp(){au.loop=!au.loop;$('lp').style.color=au.loop?"#0f8":"#fff";}
au.ontimeupdate=()=>{if(au.duration){$('prog').value=(au.currentTime/au.duration)*100;let m=Math.floor(au.currentTime/60),s=Math.floor(au.currentTime%60);$('ct').innerText=`${m}:${s<10?'0':''}${s}`;}}
$('prog').oninput=()=>{if(au.duration)au.currentTime=($('prog').value/100)*au.duration;};
function lk(b,id,u,t,a,th){b.classList.toggle('liked');if(b.classList.contains('liked'))fav.push({id,u,t,a,th});else fav=fav.filter(x=>x.id!==id);localStorage.setItem('f',JSON.stringify(fav));ldFav();}
function ldFav(){$('l-fav').innerHTML="";fav.forEach((s,i)=>{$('l-fav').innerHTML+=`<div class="item" id="if-${i}"><img src="${s.th}" onclick="pq(${i},'f')"><div class="info" onclick="pq(${i},'f')"><span class="t">${s.t}</span><span class="a">${s.a}</span></div><button class="like liked" onclick="lk(this,'${s.id}','${s.u}','${s.t.replace(/'/g,"")}','${s.a.replace(/'/g,"")}','${s.th}')">❤️</button></div>`;});}
async function sav(){if(!cur||cur.isY)return;$('msg').innerText="Saving...";try{let c=await caches.open('c');await c.add(cur.u);if(!off.some(x=>x.id===cur.id)){off.push(cur);localStorage.setItem('o',JSON.stringify(off));}ldOff();$('msg').innerText="Saved 📥";}catch(e){$('msg').innerText="Save fail";}}
function ldOff(){$('l-off').innerHTML="";off.forEach((s,i)=>{$('l-off').innerHTML+=`<div class="item" id="io-${i}"><img src="${s.th}" onclick="pq(${i},'o')"><div class="info" onclick="pq(${i},'o')"><span class="t">${s.t}</span><span class="a">${s.a}</span></div><button onclick="rmO('${s.id}','${s.u}')" style="background:none;border:none;color:#f44;font-size:20px;">🗑️</button></div>`;});}
async function rmO(id,u){let c=await caches.open('c');await c.delete(u);off=off.filter(x=>x.id!==id);localStorage.setItem('o',JSON.stringify(off));ldOff();}
function clr(){if(confirm("Reset?")){localStorage.clear();caches.keys().then(k=>k.forEach(c=>caches.delete(c)));location.reload();}} ldFav();ldOff();
</script></body></html>
