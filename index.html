<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNMW - Pro Premium</title>
    <style>
        body{background:#0f0f13;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;margin:0;padding:20px 0;min-height:100vh;}
        .box{background:#1a1a24;padding:20px;border-radius:20px;width:90%;max-width:350px;text-align:center;border:1px solid #2d2d3d;margin-bottom:20px;}
        .row{display:flex;gap:10px;margin-bottom:15px;}
        input{flex:1;padding:10px;border-radius:10px;border:none;background:#2d2d3d;color:#fff;outline:none;}
        button{padding:10px;border-radius:10px;border:none;background:#00bfff;color:#fff;font-weight:bold;cursor:pointer;}
        .tabs{display:flex;width:100%;overflow-x:auto;background:#2d2d3d;border-radius:10px;margin-bottom:15px;}
        .tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:bold;color:#888;cursor:pointer;white-space:nowrap;}
        .tab.active{background:#00bfff;color:#fff;}
        img.art{width:100%;height:250px;border-radius:15px;object-fit:cover;margin-bottom:10px;}
        .vis{display:flex;gap:5px;justify-content:center;align-items:flex-end;height:30px;margin-bottom:15px;opacity:0;}
        .vis.active{opacity:1;}
        .bar{width:6px;background:#00ff88;border-radius:3px;animation:b 0.5s infinite alternate;}
        @keyframes b{from{transform:scaleY(0.3);}to{transform:scaleY(1);}}
        .title{font-size:18px;font-weight:bold;color:#00bfff;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .artist{font-size:14px;color:#888;margin-bottom:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .ctrl{display:flex;justify-content:center;align-items:center;gap:15px;}
        .ctrl button{background:none;color:#00bfff;font-size:22px;}
        #playBtn{font-size:40px;}
        .list{display:none;width:90%;max-width:350px;text-align:left;}
        .list.active{display:block;}
        .item{background:#1a1a24;padding:10px;border-radius:10px;margin-bottom:10px;display:flex;align-items:center;gap:10px;border:1px solid #2d2d3d;}
        .item.active{border-color:#00ff88;}
        .item img{width:50px;height:50px;border-radius:5px;object-fit:cover;}
        .info{display:flex;flex-direction:column;flex:1;overflow:hidden;}
        .info span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .info .t{font-size:14px;font-weight:bold;}
        .info .a{font-size:12px;color:#888;}
        .like{background:none;font-size:18px;color:#888;}
        .like.liked{color:#ff0055;}
        #modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,15,19,0.95);z-index:100;flex-direction:column;padding:20px;box-sizing:border-box;}
    </style>
</head>
<body>
    <div class="box">
        <div id="modal"><button onclick="this.parentElement.style.display='none'" style="background:red;width:100px;align-self:end;">Close</button><h3 style="color:#0f8;">Lyrics</h3><div id="lyrText" style="overflow-y:auto;color:#ccc;white-space:pre-line;margin-top:10px;"></div></div>
        <div class="row"><input id="search" placeholder="Search..." onkeypress="if(event.key==='Enter')searchAll()"><button onclick="searchAll()">Search</button></div>
        <div class="tabs"><div class="tab active" onclick="tab('saavn')">🎵 Saavn</div><div class="tab" onclick="tab('yt')">🎥 YT</div><div class="tab" onclick="tab('fav');ldFav();">❤️ Fav</div><div class="tab" onclick="tab('off');ldOff();">📥 Off</div><div class="tab" onclick="tab('set')">⚙️ Set</div></div>
        <img id="cover" class="art" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=600&auto=format&fit=crop">
        <div class="vis" id="vis"><div class="bar"></div><div class="bar" style="animation-delay:0.2s"></div><div class="bar" style="animation-delay:0.1s;background:#0bf"></div><div class="bar" style="animation-delay:0.3s;background:#0bf"></div></div>
        <div class="title" id="title">CNMW Premium</div><div class="artist" id="artist">Pick a vibe!</div>
        <audio id="audio"></audio>
        <div class="row" style="font-size:12px;color:#888;"><span id="ct">0:00</span><input type="range" id="prog" value="0" max="100"><span id="tt">0:00</span></div>
        <div class="ctrl"><button id="lp" onclick="lp()">🔁</button><button onclick="prev()">⏮️</button><button id="playBtn" onclick="pl()">▶️</button><button onclick="nxt()">⏭️</button><button onclick="sav()">📥</button><button onclick="lyr()">📜</button></div>
        <p id="msg" style="color:#0bf;font-size:12px;margin-top:10px;"></p>
    </div>
    <div class="list active" id="l-saavn"></div><div class="list" id="l-yt"></div><div class="list" id="l-fav"></div><div class="list" id="l-off"></div>
    <div class="list" id="l-set"><button onclick="clr()" style="width:100%;background:red;">Clear App Data</button></div>
    <script>
        const $=id=>document.getElementById(id), au=$('audio'), URL="https://cnmw.onrender.com";
        let resS=[], resY=[], fav=JSON.parse(localStorage.getItem('f'))||[], off=JSON.parse(localStorage.getItem('o'))||[], q=[], qI=0, cur=null;
        function tab(p){['saavn','yt','fav','off','set'].forEach(t=>{$(`tab-${t}`).className=p===t?'tab active':'tab';$(`l-${t}`).className=p===t?'list active':'list';});}
        function msg(m){$('msg').innerText=m;}
        function searchAll(){let v=$('search').value;if(!v)return;msg("Searching... 🚀");tab('saavn');fS(v);fY(v);}
        async function fS(v){
            $('l-saavn').innerHTML="<p style='text-align:center;'>Loading Saavn...</p>";try{let r=await fetch(`${URL}/api/saavn?q=${v}`),j=await r.json(),s=j.data?.results||[];
            if(s.length){resS=[];$('l-saavn').innerHTML="";s.forEach((x,i)=>{let t=x.name||x.title,a=x.primaryArtists||x.singers,th=x.image[2]?.link||x.image[0]?.link,dl=x.downloadUrl,u=dl?dl[dl.length-1].link:"",id=x.id;if(!u)return;resS.push({id,u,t,a,th});
            $('l-saavn').innerHTML+=`<div class="item" id="is-${i}"><img src="${th}" onclick="pq(${i},'s')"><div class="info" onclick="pq(${i},'s')"><span class="t">${t}</span><span class="a">${a}</span></div><button class="like ${fav.some(f=>f.id===id)?'liked':''}" onclick="lk(this,'${id}','${u}','${t.replace(/'/g,"")}','${a.replace(/'/g,"")}','${th}')">❤️</button></div>`;});msg("Ready!");}else $('l-saavn').innerHTML="None";}catch(e){$('l-saavn').innerHTML="Error";}
        }
        async function fY(v){
            $('l-yt').innerHTML="<p style='text-align:center;'>Fetching YouTube 🎥...</p>";try{let r=await fetch(`${URL}/api/yt?q=${v}`),j=await r.json();
            if(j.items?.length){resY=[];$('l-yt').innerHTML="";j.items.forEach((x,i)=>{resY.push({id:x.videoId,t:x.title,a:x.author,th:x.videoThumbnails[0].url});
            $('l-yt').innerHTML+=`<div class="item" id="iy-${i}"><img src="${x.videoThumbnails[0].url}" onclick="py('${x.videoId}','${x.title.replace(/'/g,"")}','${x.author.replace(/'/g,"")}','${x.videoThumbnails[0].url}',${i})"><div class="info" onclick="py('${x.videoId}','${x.title.replace(/'/g,"")}','${x.author.replace(/'/g,"")}','${x.videoThumbnails[0].url}',${i})"><span class="t">${x.title}</span><span class="a">${x.author}</span><span style="font-size:10px;color:red;background:#333;width:max-content;padding:2px;border-radius:3px;">🎥 YT Extractor</span></div></div>`;});}else $('l-yt').innerHTML="None";}catch(e){$('l-yt').innerHTML="YT Blocked or Error";}
        }
        async function py(id,t,a,th,i){
            msg("Extracting Audio... 🎧");cur={id,u:"",t,a,th,isY:true};$('title').innerText=t;$('artist').innerText=a;$('cover').src=th;
            q=resY;qI=i;document.querySelectorAll('.item').forEach(e=>e.classList.remove('active'));if($(`iy-${i}`))$(`iy-${i}`).classList.add('active');
            try{let r=await fetch(`${URL}/api/yt/stream?id=${id}`),j=await r.json();if(j.adaptiveFormats){au.src=j.adaptiveFormats[0].url;stA();}else msg("Stream fail.");}catch(e){msg("Error extracting.");}
        }
        function pq(i,c){let l=c==='s'?resS:c==='f'?fav:off;if(!l[i])return;q=l;qI=i;let s=l[i];document.querySelectorAll('.item').forEach(e=>e.classList.remove('active'));let el=$(`i${c}-${i}`);if(el)el.classList.add('active');cur={...s,isY:false};$('title').innerText=s.t;$('artist').innerText=s.a;$('cover').src=s.th;au.src=s.u;stA();}
        function nxt(){if(qI<q.length-1){if(q===resY){let s=q[qI+1];py(s.id,s.t,s.a,s.th,qI+1);}else pq(qI+1,q===resS?'s':q===fav?'f':'o');}}
        function prev(){if(qI>0){if(q===resY){let s=q[qI-1];py(s.id,s.t,s.a,s.th,qI-1);}else pq(qI-1,q===resS?'s':q===fav?'f':'o');}}
        au.onended=()=>{if(!au.loop)nxt();};
        function stA(){au.play().then(()=>{$('playBtn').innerText="⏸";$('vis').className="vis active";msg("Playing... 🎵");}).catch(()=>$('playBtn').innerText="▶️");}
        function pl(){if(!au.src)return;if(au.paused)stA();else{au.pause();$('playBtn').innerText="▶️";$('vis').className="vis";}}
        function lp(){au.loop=!au.loop;$('lp').style.color=au.loop?"#0f8":"#0bf";}
        au.ontimeupdate=()=>{if(au.duration){$('prog').value=(au.currentTime/au.duration)*100;let m=Math.floor(au.currentTime/60),s=Math.floor(au.currentTime%60);$('ct').innerText=`${m}:${s<10?'0':''}${s}`;}}
        $('prog').oninput=()=>{if(au.duration)au.currentTime=($('prog').value/100)*au.duration;};
        function lk(b,id,u,t,a,th){b.classList.toggle('liked');if(b.classList.contains('liked'))fav.push({id,u,t,a,th});else fav=fav.filter(x=>x.id!==id);localStorage.setItem('f',JSON.stringify(fav));ldFav();}
        function ldFav(){$('l-fav').innerHTML="";fav.forEach((s,i)=>{$('l-fav').innerHTML+=`<div class="item" id="if-${i}"><img src="${s.th}" onclick="pq(${i},'f')"><div class="info" onclick="pq(${i},'f')"><span class="t">${s.t}</span><span class="a">${s.a}</span></div><button class="like liked" onclick="lk(this,'${s.id}','${s.u}','${s.t.replace(/'/g,"")}','${s.a.replace(/'/g,"")}','${s.th}')">❤️</button></div>`;});}
        async function sav(){if(!cur||cur.isY)return msg("Play a Saavn song to download.");msg("Saving to App... ⏳");try{let c=await caches.open('c');await c.add(cur.u);if(!off.some(x=>x.id===cur.id)){off.push(cur);localStorage.setItem('o',JSON.stringify(off));}msg("Saved Offline! 📥");ldOff();}catch(e){msg("Save fail.");}}
        function ldOff(){$('l-off').innerHTML="";off.forEach((s,i)=>{$('l-off').innerHTML+=`<div class="item" id="io-${i}"><img src="${s.th}" onclick="pq(${i},'o')"><div class="info" onclick="pq(${i},'o')"><span class="t">${s.t}</span><span class="a">${s.a}</span></div><button onclick="rmO('${s.id}','${s.u}')" style="background:none;border:none;font-size:20px;cursor:pointer;">🗑️</button></div>`;});}
        async function rmO(id,u){let c=await caches.open('c');await c.delete(u);off=off.filter(x=>x.id!==id);localStorage.setItem('o',JSON.stringify(off));ldOff();}
        function clr(){if(confirm("Delete all App data?")){localStorage.clear();caches.keys().then(k=>k.forEach(x=>caches.delete(x)));location.reload();}}
        async function lyr(){if(!cur||cur.isY)return msg("No lyrics for YT");$('modal').style.display='flex';$('lyrText').innerText="Extracting... ⏳";try{let r=await fetch(`https://saavn.me/lyrics?id=${cur.id}`),j=await r.json();$('lyrText').innerHTML=j.data?.lyrics?.replace(/<br>/g,"\n")||"Sorry, no lyrics found 🥲";}catch(e){$('lyrText').innerText="Error fetching lyrics.";}}
        ldFav();ldOff();
    </script>
</body>
</html>
